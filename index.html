<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

.player{
    position:relative;
    width:100vw;
    height:100vh;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

/* botón simple */
.btn{
    position:absolute;
    bottom:15px;
    right:15px;
    background:rgba(0,0,0,0.6);
    color:white;
    border:none;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="player">
    <video id="video" autoplay controls></video>
    <button class="btn" onclick="fullscreen()">⛶ Fullscreen</button>
</div>

<script>
const video = document.getElementById('video');

/* 🔥 TU STREAM */
const src = "https://mdstrm.com/live-stream-playlist/689ba606ecfe7915e1f8f741.m3u8?PlaylistM3UCL";

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
} else {
    video.src = src;
}

/* FULLSCREEN SIMPLE */
function fullscreen(){
    document.querySelector('.player').requestFullscreen();
}
</script>

</body>
</html>
